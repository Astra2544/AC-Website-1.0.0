<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>404 - Seite nicht gefunden | Astra Capital</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Raleway', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { padding: 40px; }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 120px;
            font-weight: 700;
            color: #ff264a;
            line-height: 1;
            margin-bottom: 20px;
        }
        h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 0.1em;
        }
        p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            font-size: 16px;
        }
        a {
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid #ff264a;
            color: #fff;
            text-decoration: none;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        a:hover {
            background: #ff264a;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>SEITE NICHT GEFUNDEN</h2>
        <p>Die angeforderte Seite existiert nicht oder wurde verschoben.</p>
        <a href="/">Zurück zur Startseite</a>
    </div>
</body>
</html>
