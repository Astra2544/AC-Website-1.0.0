# Astra Capital e.U. - Docker Compose

version: '3.8'

services:
  astra-website:
    build: .
    container_name: ${CONTAINER_NAME:-astra-capital-website}
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    environment:
      - CONTAINER_NAME=${CONTAINER_NAME:-astra-capital-website}
      - PORT=${PORT:-8080}
      - DOMAIN=${DOMAIN:-astra-capital.eu}
      - TZ=${TZ:-Europe/Vienna}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-info@astra-capital.at}
    volumes:
      - ./logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: astra-network
