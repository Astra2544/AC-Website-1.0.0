# Astra Capital e.U. - Docker Compose

version: '3.8'

services:
  astra-website:
    build: .
    container_name: astra-capital-website
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Europe/Vienna
    volumes:
      - ./logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: astra-network
