# =====================================================
# Astra Capital e.U. - Docker Compose
# =====================================================
#
# Starten: docker-compose up -d --build
# Stoppen: docker-compose down
# Logs:    docker-compose logs -f
# Rebuild: docker-compose up -d --build --force-recreate
#
# =====================================================

version: '3.8'

services:
  # ===========================================
  # ASTRA CAPITAL WEBSITE
  # ===========================================
  astra-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-astra-capital-website}
    restart: unless-stopped
    
    # Port Mapping - Externer Port : Interner Port
    ports:
      - "${WEBSITE_PORT:-8080}:80"
    
    # Umgebungsvariablen
    environment:
      - TZ=${TIMEZONE:-Europe/Vienna}
      - NGINX_HOST=${DOMAIN:-localhost}
      - NGINX_PORT=80
    
    # Volumes für Persistenz (optional)
    volumes:
      # Logs
      - ${LOG_PATH:-./logs}:/var/log/nginx
      # Optional: Live-Reload der Website (für Entwicklung)
      # - ./MAIN-WEBSITE:/usr/share/nginx/html:ro
    
    # Netzwerk
    networks:
      - astra-network
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-0.5}'
          memory: ${MEMORY_LIMIT:-256M}
        reservations:
          cpus: '0.1'
          memory: 64M
    
    # Health Check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Labels für Traefik/andere Reverse Proxies (optional)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.astra.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.astra.loadbalancer.server.port=80"

# ===========================================
# NETZWERKE
# ===========================================
networks:
  astra-network:
    driver: bridge
    name: ${NETWORK_NAME:-astra-network}

# ===========================================
# VOLUMES (optional für Logs)
# ===========================================
volumes:
  astra-logs:
    driver: local
